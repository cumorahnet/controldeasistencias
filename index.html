<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGE QR - Control de Asistencias</title>
    <script src="https://cdn.tailwindcss.com/"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #1e293b; --accent-color: #3b82f6; }
        .theme-primary { background-color: var(--primary-color); }
        .theme-text { color: var(--primary-color); }
        .theme-border { border-color: var(--primary-color); }
        .theme-accent { background-color: var(--accent-color); }
        .setup-step { display: none; }
        .setup-step.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input[type="time"], input[type="number"] { text-align: center; font-weight: 700; }
        .scroll-custom::-webkit-scrollbar { width: 6px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        .user-id-badge { background: #ffffff; border: 2px solid var(--accent-color); border-radius: 1.5rem; padding: 0.5rem 1.25rem; display: flex; align-items: center; gap: 0.75rem; box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.08); }
        @media print { .no-print { display: none !important; } }
        .logo-svg { width: 110px; height: 110px; transition: all 0.3s ease; }
        .btn-disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
        .subtab-active { background-color: var(--accent-color) !important; color: white !important; border-color: var(--accent-color) !important; }
        .cat-active { border-bottom: 3px solid var(--accent-color) !important; color: var(--accent-color) !important; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 font-sans text-xs">

    <!-- MODAL DE MENSAJES -->
    <div id="custom-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[900] hidden flex items-center justify-center p-4 text-center">
        <div class="bg-white rounded-[2.5rem] shadow-2xl max-w-sm w-full p-10 space-y-4 border-t-8 theme-border">
            <h3 id="modal-msg-title" class="text-lg font-black theme-text uppercase">Aviso</h3>
            <p id="modal-msg-body" class="text-sm text-slate-600 font-medium"></p>
            <div id="modal-msg-footer" class="flex flex-col gap-2 pt-4">
                <button id="btn-modal-confirm" class="w-full theme-accent text-white py-3 rounded-xl font-bold text-xs uppercase shadow-lg active:scale-95">Aceptar</button>
            </div>
        </div>
    </div>

    <!-- PASARELA DE ACCESO -->
    <section id="section-gateway" class="fixed inset-0 bg-slate-900 z-[400] overflow-y-auto p-4 flex flex-col justify-center items-center text-center text-center">
        <div class="bg-white p-8 md:p-12 rounded-[3.5rem] shadow-2xl max-w-lg w-full space-y-8 border-t-[14px] border-orange-500 relative">
            <div class="flex justify-center mb-2">
                <svg class="logo-svg" viewBox="0 0 100 100">
                    <rect x="25" y="45" width="50" height="40" fill="#fde68a" rx="2" /><path d="M20 45 L50 20 L80 45 Z" fill="#ef4444" /><rect x="44" y="65" width="12" height="20" fill="#78350f" rx="1" /><rect x="32" y="55" width="8" height="8" fill="#bae6fd" rx="1" /><rect x="60" y="55" width="8" height="8" fill="#bae6fd" rx="1" /><line x1="75" y1="15" x2="75" y2="45" stroke="#475569" stroke-width="2" /><rect x="75" y="15" width="7" height="15" fill="#006847" /><rect x="82" y="15" width="7" height="15" fill="#ffffff" /><rect x="89" y="15" width="7" height="15" fill="#ce1126" />
                </svg>
            </div>

            <!-- PASO 1: CCT -->
            <div id="step-school-key" class="setup-step active space-y-6">
                <h1 class="text-2xl font-black theme-text uppercase tracking-tighter">Control Escolar QR</h1>
                <div class="space-y-1 text-left">
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-4">Clave del Centro de Trabajo (CCT)</label>
                    <input id="input-school-key" type="text" placeholder="17DPRXXXXX" class="w-full px-4 py-5 border-2 border-slate-100 rounded-3xl outline-none focus:border-orange-500 text-center text-xl font-black uppercase">
                </div>
                <button id="btn-validate-cct" onclick="window.validateSchoolCCT()" class="w-full theme-accent text-white font-black py-5 rounded-3xl shadow-xl uppercase active:scale-95 btn-disabled">Conectando...</button>
            </div>

            <!-- PASO 1.5: CLAVE INSTITUCIONAL -->
            <div id="step-school-access" class="setup-step space-y-6">
                <div class="p-6 bg-slate-50 rounded-[2.5rem] border border-slate-100">
                    <p id="access-display-name" class="text-lg font-black theme-text uppercase italic text-center text-center">--</p>
                    <p id="access-display-cct" class="text-[10px] text-slate-400 font-mono italic text-center">--</p>
                </div>
                <div class="space-y-4">
                    <div class="relative text-left">
                        <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1 ml-4 block text-center">Clave de Acceso Institucional</label>
                        <input id="input-school-access-key" type="password" placeholder="••••••••" class="w-full px-4 py-5 border-2 border-slate-100 rounded-3xl outline-none focus:border-orange-500 text-center text-3xl font-black uppercase shadow-inner text-center">
                    </div>
                    <button onclick="window.verifySchoolAccess()" class="w-full bg-orange-600 text-white font-black py-5 rounded-3xl shadow-xl active:scale-95 text-sm uppercase">Entrar</button>
                </div>
                <button onclick="window.resetGateway()" class="text-[9px] text-slate-400 font-bold uppercase underline">Cambiar CCT</button>
            </div>

            <!-- PASO 2: REGISTRO -->
            <div id="step-school-register" class="setup-step space-y-6">
                <h2 class="text-xl font-black theme-text uppercase tracking-tighter">Registrar Escuela</h2>
                <div class="space-y-4 text-left">
                    <input id="input-new-school-name" type="text" placeholder="NOMBRE DE LA ESCUELA" class="w-full px-4 py-3 border-2 border-slate-100 rounded-2xl outline-none focus:border-orange-500 text-center font-bold uppercase">
                    <input id="input-new-school-password" type="text" placeholder="PASSWORD DEL PLANTEL" class="w-full px-4 py-3 border-2 border-slate-100 rounded-2xl outline-none focus:border-orange-500 text-center font-black uppercase text-center">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="input-director-name" type="text" placeholder="DIRECTOR(A)" class="w-full px-4 py-3 border border-slate-200 rounded-2xl uppercase font-bold text-center">
                        <input id="input-admin-name" type="text" placeholder="ADMINISTRADOR" class="w-full px-4 py-3 border border-slate-200 rounded-2xl uppercase font-bold text-center">
                    </div>
                </div>
                <button onclick="window.registerSchoolAndAdmin()" class="w-full bg-slate-800 text-white font-black py-5 rounded-3xl shadow-xl active:scale-95 text-xs uppercase">Crear e Iniciar</button>
                <button onclick="window.resetGateway()" class="text-[9px] text-slate-400 font-bold uppercase underline block w-full mt-2">Cancelar</button>
            </div>

            <!-- PASO 3: LOGIN PERSONAL -->
            <div id="step-login" class="setup-step space-y-6 text-center">
                <div class="p-6 bg-blue-50 rounded-[2.5rem] border border-blue-100 text-center">
                    <p id="display-school-name" class="text-lg font-black theme-text uppercase italic text-center">--</p>
                    <p id="display-school-key" class="text-[9px] text-slate-400 font-mono italic text-center">--</p>
                </div>
                <div class="space-y-4">
                    <div class="relative text-left">
                        <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1 ml-4 block text-center">Su ID Personal de Acceso</label>
                        <input id="input-login-id" type="password" placeholder="••••••••" class="w-full px-4 py-5 border-2 border-slate-100 rounded-3xl outline-none focus:border-orange-500 text-center text-3xl font-black uppercase shadow-inner text-center">
                    </div>
                    <button onclick="window.attemptLogin()" class="w-full theme-accent text-white font-black py-5 rounded-3xl shadow-xl active:scale-95 text-sm uppercase">Entrar al Panel</button>
                </div>
                <button onclick="window.resetGateway()" class="text-[9px] text-slate-400 font-bold uppercase underline block w-full mt-2">Cambiar CCT</button>
            </div>
        </div>
    </section>

    <!-- UI PRINCIPAL -->
    <header id="main-header" class="bg-white shadow-sm no-print hidden border-b border-slate-200 sticky top-0 z-[100] text-center">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4 text-center">
            <div class="flex items-center gap-4 text-left">
                <div class="w-12 h-12 flex items-center justify-center rounded-2xl theme-primary text-white shadow-lg p-1.5 text-center">
                    <svg class="w-full h-full" viewBox="0 0 100 100"><rect x="25" y="45" width="50" height="40" fill="white" rx="2" /><path d="M20 45 L50 20 L80 45 Z" fill="#ef4444" /><line x1="75" y1="15" x2="75" y2="45" stroke="white" stroke-width="3" /></svg>
                </div>
                <div class="flex flex-col text-left">
                    <h1 id="header-school-name" class="text-xl font-black uppercase theme-text leading-none tracking-tighter italic text-center text-center">--</h1>
                    <div class="user-id-badge shadow-sm mt-1 text-center">
                        <i class="fas fa-user-circle theme-accent-text text-lg"></i>
                        <div class="flex flex-col leading-none text-center"><span id="user-display-name" class="text-[11px] font-black text-slate-900 uppercase">--</span><span id="user-display-role" class="text-[8px] font-bold theme-accent-text uppercase italic">Docente</span></div>
                    </div>
                </div>
            </div>
            <nav class="flex gap-1 bg-slate-100 p-1 rounded-2xl items-center shadow-inner justify-center text-center">
                <button onclick="window.switchTab('scanner')" id="tab-scanner" class="px-5 py-2.5 rounded-xl transition-all text-[10px] font-black uppercase">Escanear</button>
                <button onclick="window.switchTab('admin')" id="tab-admin" class="px-5 py-2.5 rounded-xl transition-all text-[10px] font-black uppercase hidden">Gestión</button>
                <div class="h-6 w-px bg-slate-300 mx-2"></div>
                <button onclick="window.logout()" class="p-2.5 text-red-400 hover:text-red-600 transition-colors"><i class="fas fa-power-off"></i></button>
            </nav>
        </div>
    </header>

    <main id="main-content" class="max-w-6xl mx-auto p-4 md:p-8 no-print hidden text-center">
        <section id="section-scanner" class="space-y-8 animate-fadeIn text-center">
            <div class="max-w-md mx-auto bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-slate-200">
                <div class="theme-primary p-6 text-white text-center">
                    <h2 class="text-lg font-black uppercase">Escaneo QR</h2>
                    <p id="current-schedule-label" class="text-[9px] opacity-80 uppercase font-black italic mt-1 text-center">Conectado</p>
                </div>
                <div class="p-8 space-y-6">
                    <div id="qr-reader" class="rounded-[2.5rem] overflow-hidden border-4 border-dashed border-slate-100 bg-slate-50 min-h-[350px]"></div>
                    <button onclick="window.toggleCamera()" id="btn-camera" class="w-full bg-slate-800 hover:bg-black text-white font-black py-5 rounded-[2.5rem] shadow-xl uppercase text-[10px] flex items-center justify-center gap-3"><i class="fas fa-video"></i> <span id="btn-camera-text">Apagar Cámara</span></button>
                    <div class="flex gap-3"><input id="input-manual-id" type="text" placeholder="ID ALUMNO" class="flex-1 px-5 py-3 border-2 border-slate-100 rounded-3xl uppercase font-black outline-none focus:ring-2 focus:ring-orange-500 text-center shadow-sm"><button onclick="window.manualAttendance()" class="theme-accent text-white px-8 py-3 rounded-3xl text-xs font-black uppercase shadow-lg">OK</button></div>
                </div>
            </div>
            <div class="bg-white rounded-[3rem] border border-slate-200 overflow-hidden max-w-2xl mx-auto shadow-xl text-left text-center">
                <div class="px-10 py-6 bg-slate-50 border-b flex justify-between items-center text-center text-center"><h3 class="font-black text-[10px] theme-text uppercase tracking-widest text-center">Actividad de Hoy</h3><span id="scan-count" class="bg-orange-100 text-orange-700 text-[10px] font-black px-6 py-2 rounded-full uppercase italic tracking-tighter text-center">0 HOY</span></div>
                <ul id="recent-logs" class="divide-y divide-slate-100 max-h-96 overflow-y-auto scroll-custom text-center text-center"><li class="p-14 text-center text-slate-300 italic font-bold text-center">Sin actividad hoy</li></ul>
            </div>
        </section>

        <!-- PANEL GESTIÓN -->
        <section id="section-admin" class="hidden space-y-8 animate-fadeIn text-left text-center">
            <div id="admin-tabs" class="flex flex-wrap gap-2 border-b border-slate-200 pb-5 justify-center md:justify-start text-center text-center">
                <button onclick="window.switchMaintCategory('alumnos')" class="px-6 py-3 rounded-2xl bg-white border text-[11px] font-black uppercase theme-text text-center text-center">Alumnos</button>
                <button onclick="window.switchMaintCategory('institucion')" class="px-6 py-3 rounded-2xl bg-white border text-[11px] font-black uppercase text-orange-600 text-center text-center">Institución</button>
            </div>
            <div id="subcontent-mantenimiento" class="space-y-6 text-center text-center">
                <div id="div-mantenimiento-alumnos" class="grid grid-cols-1 md:grid-cols-2 gap-8 text-center text-center">
                    <div class="bg-white p-10 rounded-[3rem] border border-slate-200 space-y-5 shadow-xl text-center text-center text-center">
                        <h3 class="font-black theme-text uppercase text-[11px] border-b pb-3 text-center text-center">Registro de Alumno</h3>
                        <div class="space-y-4 text-left text-center text-center text-center"><label class="text-[8px] font-black text-slate-400 uppercase ml-3 text-center text-center">Matrícula</label><input id="input-a-id" type="text" class="w-full px-5 py-3 border rounded-3xl uppercase font-black outline-none theme-border text-center shadow-inner text-center"><label class="text-[8px] font-black text-slate-400 uppercase ml-3 text-center text-center text-center">Nombre</label><input id="input-a-name" type="text" class="w-full px-5 py-3 border rounded-3xl uppercase font-bold outline-none theme-border text-center shadow-inner text-center text-center"><button onclick="window.addStudent()" class="w-full theme-primary text-white font-black py-4 rounded-3xl uppercase text-[11px] shadow-xl text-center">Guardar</button></div>
                    </div>
                    <div class="bg-white p-10 rounded-[3rem] border border-slate-200 text-center shadow-xl flex flex-col justify-center text-center text-center text-center"><i class="fas fa-file-csv text-5xl text-slate-200 mb-4 text-center"></i><h3 class="font-black theme-text uppercase text-[11px] border-b pb-3 mb-4 tracking-tighter text-center">Cargar CSV</h3><input type="file" id="csv-file-input" accept=".csv" class="hidden text-center text-center text-center"><button onclick="document.getElementById('csv-file-input').click()" class="w-full bg-slate-50 text-slate-600 py-5 rounded-3xl border border-slate-200 font-black uppercase text-[10px] hover:bg-slate-100 text-center">Subir Archivo</button></div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, onSnapshot, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        // CREDENCIALES UNIFICADAS[cite: 4]
        const firebaseConfig = { apiKey: "AIzaSyBLH2OuKVr8ez5_9GeRJBcnHFlhfgeHD1o", authDomain: "controldeasistencias-8308c.firebaseapp.com", projectId: "controldeasistencias-8308c", storageBucket: "controldeasistencias-8308c.firebasestorage.app", messagingSenderId: "409924433431", appId: "1:409924433431:web:ee649dc98030edc4bece52" };
        const appId = 'listadeasistencia';
        const fbApp = initializeApp(firebaseConfig);
        const db = getFirestore(fbApp);
        const auth = getAuth(fbApp);

        let schoolKey = "", schoolName = "", currentUser = null, loggedTeacher = null, students = [], html5QrScanner = null, isScannerRunning = false;

        const getColl = (name) => collection(db, 'artifacts', appId, 'public', 'data', `${schoolKey}_${name}`);
        const getDocRef = (coll, id) => doc(db, 'artifacts', appId, 'public', 'data', `${schoolKey}_${coll}`, id);

        window.getMexicoDate = () => new Intl.DateTimeFormat('en-CA', { timeZone: 'America/Mexico_City' }).format(new Date());
        window.getMexicoTime = () => new Intl.DateTimeFormat('es-MX', { timeZone: 'America/Mexico_City', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(new Date());

        window.resetGateway = () => { 
            schoolKey = ""; schoolName = "";
            const btn = document.getElementById('btn-validate-cct'); if(btn) { btn.innerText = "Validar CCT"; btn.classList.remove('btn-disabled'); }
            document.querySelectorAll('.setup-step').forEach(s => s.classList.remove('active')); 
            document.getElementById('step-school-key').classList.add('active'); 
        };

        window.logout = () => { loggedTeacher = null; document.querySelectorAll('header, main').forEach(el => el.classList.add('hidden')); document.getElementById('section-gateway').classList.remove('hidden'); window.resetGateway(); };

        window.validateSchoolCCT = async () => {
            const btn = document.getElementById('btn-validate-cct'); if(!btn || !currentUser) return;
            const cct = document.getElementById('input-school-key').value.trim().toUpperCase();
            if(!cct) return;
            if(cct === 'TLAHUISCALPANTECUTLI') { loggedTeacher = { id: 'MASTER', nombre: 'SOPORTE GLOBAL', role: 'super' }; schoolKey = "SISTEMA"; schoolName = "SGE SaaS"; return enterApp(); }
            
            btn.innerText = "Consultando..."; btn.classList.add('btn-disabled');
            schoolKey = cct;
            try {
                const sDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'colegios', schoolKey));
                if (sDoc.exists()) {
                    schoolName = sDoc.data().name; document.getElementById('access-display-name').innerText = schoolName; 
                    document.getElementById('access-display-cct').innerText = `CCT: ${schoolKey}`;
                    document.querySelectorAll('.setup-step').forEach(s => s.classList.remove('active')); document.getElementById('step-school-access').classList.add('active');
                } else {
                    document.querySelectorAll('.setup-step').forEach(s => s.classList.remove('active')); document.getElementById('step-school-register').classList.add('active');
                }
            } catch (e) { alert("Error de Red. Reintente."); btn.innerText = "Validar CCT"; btn.classList.remove('btn-disabled'); }
        };

        window.verifySchoolAccess = async () => {
            const k = document.getElementById('input-school-access-key').value.trim().toUpperCase();
            try {
                const sDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'colegios', schoolKey));
                if (sDoc.data().accessKey === k) {
                    document.getElementById('display-school-name').innerText = schoolName; document.getElementById('display-school-key').innerText = `CCT: ${schoolKey}`;
                    document.querySelectorAll('.setup-step').forEach(s => s.classList.remove('active')); document.getElementById('step-login').classList.add('active');
                } else { alert("Clave Incorrecta"); }
            } catch (e) {}
        };

        window.registerSchoolAndAdmin = async () => {
            const n = document.getElementById('input-new-school-name').value.trim().toUpperCase(), p = document.getElementById('input-new-school-password').value.trim().toUpperCase(), d = document.getElementById('input-director-name').value.trim().toUpperCase(), a = document.getElementById('input-admin-name').value.trim().toUpperCase();
            if (!n || !p || !d || !a) return;
            try {
                // FIXED: Se asegura que el registro sea asíncrono y estable[cite: 2]
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'colegios', schoolKey), { name: n, accessKey: p, director: d, adminMaster: a, createdAt: serverTimestamp() });
                await setDoc(getDocRef('maestros', '123'), { nombre: a, role: 'admin_maestro', idCambiado: false });
                schoolName = n; document.getElementById('display-school-name').innerText = schoolName;
                document.querySelectorAll('.setup-step').forEach(s => s.classList.remove('active')); document.getElementById('step-login').classList.add('active');
            } catch (e) { alert("Fallo al registrar."); }
        };

        window.attemptLogin = async () => {
            const id = document.getElementById('input-login-id').value.trim().toUpperCase();
            if(!id) return;
            try {
                const tSnap = await getDoc(getDocRef('maestros', id));
                if (tSnap.exists()) { loggedTeacher = { id: tSnap.id, ...tSnap.data() }; enterApp(); } else { alert("ID no encontrado."); }
            } catch (e) {}
        };

        async function enterApp() {
            document.querySelectorAll('.fixed').forEach(m => m.classList.add('hidden'));
            document.getElementById('main-header').classList.remove('hidden'); document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('header-school-name').innerText = schoolName; document.getElementById('user-display-name').innerText = loggedTeacher.nombre;
            document.getElementById('tab-admin').classList.toggle('hidden', !(['super', 'admin_maestro'].includes(loggedTeacher.role)));
            loadStudents(); listenToAttendanceToday(); window.switchTab('scanner');
        }

        window.handleCSVImport = (event) => {
            const file = event.target.files[0];
            Papa.parse(file, { header: true, complete: async (results) => {
                const batch = writeBatch(db);
                for(const row of results.data) {
                    const id = row.Matrícula || row.ID || row.id;
                    if(id && row.Nombre) batch.set(getDocRef('alumnos', id.toString().toUpperCase()), { nombre: row.Nombre.toUpperCase(), createdAt: serverTimestamp() });
                }
                await batch.commit(); loadStudents();
            }});
        };

        window.switchTab = async (t) => {
            document.getElementById('section-scanner').classList.toggle('hidden', t !== 'scanner'); document.getElementById('section-admin').classList.toggle('hidden', t !== 'admin');
            if (t === 'scanner') await window.initScanner(); else { if(isScannerRunning) await html5QrScanner.stop(); isScannerRunning = false; }
        };

        window.switchMaintCategory = async (c) => {
            ['alumnos', 'institucion'].forEach(x => { if(document.getElementById(`div-mantenimiento-${x}`)) document.getElementById(`div-mantenimiento-${x}`).classList.add('hidden'); });
            if(document.getElementById(`div-mantenimiento-${c}`)) document.getElementById(`div-mantenimiento-${c}`).classList.remove('hidden');
            if(c === 'alumnos') await loadStudents();
        };

        async function loadStudents() { if(!schoolKey || schoolKey=="SISTEMA") return; try { const s = await getDocs(getColl('alumnos')); students = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>a.nombre.localeCompare(b.nombre)); renderTable(); } catch(e){} }
        function renderTable() {
            const b = document.getElementById('data-table-body'); if(!b) return;
            const h = document.getElementById('table-headers');
            h.innerHTML = `<tr><th>ID</th><th>Alumno</th><th>X</th></tr>`;
